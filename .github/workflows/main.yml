name: 자산 지표 실시간 알림

on:
  schedule:
    # 매시 정각(한국시간 기준 매시 9분경 실행될 수 있음)에 실행
    - cron: '0 * * * *' 
  workflow_dispatch: # 수동으로 [Run workflow] 버튼을 눌러 테스트 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 3.10 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install yfinance python-telegram-bot

      - name: 봇 실행
        run: python bot.py
